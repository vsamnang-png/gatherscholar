<!DOCTYPE html>
<html>
<head>
    <title>GatherScholar</title>

    <style>

        body{
            font-family: Arial;
            background:#f5f6fa;
            padding:20px;
        }

        .container{
            max-width:900px;
            margin:auto;
            background:white;
            padding:20px;
            border-radius:8px;
            box-shadow:0 3px 10px rgba(0,0,0,0.1);
        }

        h1{
            text-align:center;
        }

        input{
            padding:8px;
            margin:5px;
        }

        button{
            padding:8px 12px;
            background:#3498db;
            border:none;
            color:white;
            border-radius:4px;
            cursor:pointer;
        }

        button:hover{
            background:#2980b9;
        }

        table{
            width:100%;
            margin-top:20px;
            border-collapse:collapse;
        }

        th,td{
            padding:10px;
            border-bottom:1px solid #ddd;
        }

    </style>
</head>

<body>

<div class="container">

    <h1>Gatherscholar</h1>

    <h3>Add Scholarship</h3>

    <input id="name" placeholder="Name">
    <input id="country" placeholder="Country">
    <input id="level" placeholder="Level">
    <input id="deadline" placeholder="Deadline">

    <button onclick="addScholarship()">Add</button>

    <hr>

    <h3>Search</h3>

    <input id="searchName" placeholder="Search by name">
    <button onclick="searchName()">Search</button>

    <input id="searchCountry" placeholder="Search by country">
    <button onclick="searchCountry()">Search</button>

    <button onclick="loadAll()">View All</button>

    <table>

        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Country</th>
            <th>Level</th>
            <th>Deadline</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody id="tableBody"></tbody>

    </table>

</div>

<script>

    function loadAll(){

        fetch("/scholarships")
            .then(res => res.json())
            .then(data => showTable(data))

    }

    function searchName(){

        const name=document.getElementById("searchName").value

        fetch("/scholarships/search?name="+name)
            .then(res=>res.json())
            .then(data=>showTable(data))

    }

    function searchCountry(){

        const country=document.getElementById("searchCountry").value

        fetch("/scholarships/country/"+country)
            .then(res=>res.json())
            .then(data=>showTable(data))

    }

    function addScholarship(){

        const scholarship={

            name:document.getElementById("name").value,
            country:document.getElementById("country").value,
            level:document.getElementById("level").value,
            deadline:document.getElementById("deadline").value

        }

        fetch("/scholarships",{
            method:"POST",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(scholarship)
        })
            .then(()=>loadAll())

    }

    function deleteScholarship(id){

        fetch("/scholarships/"+id,{
            method:"DELETE"
        })
            .then(()=>loadAll())

    }

    function updateScholarship(id){

        const name=prompt("New name")
        const country=prompt("New country")
        const level=prompt("New level")
        const deadline=prompt("New deadline")

        const scholarship={
            name:name,
            country:country,
            level:level,
            deadline:deadline
        }

        fetch("/scholarships/"+id,{
            method:"PUT",
            headers:{
                "Content-Type":"application/json"
            },
            body:JSON.stringify(scholarship)
        })
            .then(()=>loadAll())

    }

    function showTable(data){

        const table=document.getElementById("tableBody")

        table.innerHTML=""

        data.forEach(s=>{

            table.innerHTML+=`

<tr>
<td>${s.id}</td>
<td>${s.name}</td>
<td>${s.country}</td>
<td>${s.level}</td>
<td>${s.deadline}</td>
<td>
<button onclick="updateScholarship(${s.id})">Edit</button>
<button onclick="deleteScholarship(${s.id})">Delete</button>
</td>
</tr>

`

        })

    }

    loadAll()

</script>

</body>
</html>
